<!DOCTYPE html>
<html lang="sv"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>PiggyPiggy — Världskartan</title>
<style>
 *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
 html,body{margin:0;min-height:100%;background:linear-gradient(#1a1230,#241436 60%,#2b1a3e);color:#fff;
   font-family:ui-rounded,"SF Pro Rounded",system-ui,Segoe UI,sans-serif}
 /* ---- kartan (gångbar canvas-övervärld) ---- */
 #map{position:fixed;inset:0;background:#241436}
 #map.off{display:none}
 #gwrap2{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
 #map canvas{image-rendering:auto;width:100%;height:100%;object-fit:contain}
 a.home{position:fixed;top:10px;left:12px;z-index:30;width:42px;height:42px;border-radius:50%;
   background:rgba(20,12,40,.5);border:2px solid rgba(255,255,255,.55);color:#fff;font-size:20px;
   display:flex;align-items:center;justify-content:center;text-decoration:none}
 /* ---- spelet ---- */
 #game{position:fixed;inset:0;display:none;background:#241436}
 #game.on{display:block}
 #gwrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
 canvas{image-rendering:pixelated;width:100%;height:100%;object-fit:contain}
 #touch{position:fixed;inset:auto 0 0 0;display:flex;justify-content:space-between;padding:16px 20px;pointer-events:none;gap:12px}
 .pad{display:flex;gap:12px;pointer-events:auto}
 .tbtn{width:74px;height:74px;border-radius:50%;border:3px solid rgba(255,255,255,.6);
   background:rgba(20,12,40,.4);color:#fff;font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;touch-action:none}
 .tbtn:active{background:rgba(244,214,74,.85);color:#2b2440}
 #gJump{width:92px;height:92px;font-size:19px}
 @media (hover:hover){#touch{opacity:.35}}
 #toMap{position:fixed;top:10px;right:12px;z-index:30;width:42px;height:42px;border-radius:50%;
   background:rgba(20,12,40,.5);border:2px solid rgba(255,255,255,.55);color:#fff;font-size:20px;cursor:pointer}
 /* ---- resultatbanner ---- */
 #banner{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;background:rgba(15,9,30,.72)}
 #banner.on{display:flex}
 .bcard{background:#342a4f;border:3px solid #f4d64a;border-radius:22px;padding:26px 30px;text-align:center;max-width:340px;width:88%}
 .bcard h2{margin:0 0 6px;color:#f4d64a}
 .bstars{font-size:40px;letter-spacing:6px;margin:10px 0}
 .bstars span{opacity:.25} .bstars span.won{opacity:1;animation:pop .5s}
 @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.35)}100%{transform:scale(1)}}
 .crit{font-size:14px;text-align:left;margin:0 auto 14px;display:inline-block;line-height:1.7}
 .bbtn{display:inline-block;border:0;border-radius:14px;padding:12px 18px;margin:4px;font-family:inherit;
   font-size:16px;font-weight:700;cursor:pointer;background:#f4d64a;color:#2b2440}
 .bbtn.alt{background:#5b3b8c;color:#fff}
</style></head><body>

<div id="map">
 <div id="gwrap2"><canvas id="mcv" width="880" height="480"></canvas></div>
 <a class="home" href="index.html" aria-label="Till startmenyn">⌂</a>
</div>

<div id="game">
 <div id="gwrap"><canvas id="cv" width="880" height="480"></canvas></div>
 <button id="toMap" aria-label="Till kartan">🗺️</button>
</div>

<div id="touch">
 <div class="pad"><div class="tbtn" id="gLeft">◀</div><div class="tbtn" id="gRight">▶</div></div>
 <div class="pad"><div class="tbtn" id="gJump">HOPP</div></div>
</div>

<div id="banner"><div class="bcard">
 <h2 id="bTitle">Bana klarad!</h2>
 <div class="bstars"><span id="s1">⭐</span><span id="s2">⭐</span><span id="s3">⭐</span></div>
 <div class="crit" id="bCrit"></div><br>
 <button class="bbtn alt" id="bAgain">↻ Spela igen</button>
 <button class="bbtn" id="bMap">🗺️ Till kartan</button>
</div></div>

            {x:1160,y:570},{x:1255,y:495},{x:1350,y:420}];
const NODE_PI=[1,3,6,8,11,13];
const PLEN=[0]; for(let i=1;i<PATH.length;i++)PLEN.push(PLEN[i-1]+Math.hypot(PATH[i].x-PATH[i-1].x,PATH[i].y-PATH[i-1].y));
function posAt(d){ d=Math.max(0,Math.min(PLEN[PLEN.length-1],d));
  let i=1; while(i<PLEN.length-1&&PLEN[i]<d)i++;
  const t=(d-PLEN[i-1])/((PLEN[i]-PLEN[i-1])||1);
  return {x:PATH[i-1].x+(PATH[i].x-PATH[i-1].x)*t,y:PATH[i-1].y+(PATH[i].y-PATH[i-1].y)*t,
          dx:PATH[i].x-PATH[i-1].x}; }

let MAC=null; function mbeep(f,d,t,v){try{if(!MAC)MAC=new(window.AudioContext||window.webkitAudioContext)();
  const o=MAC.createOscillator(),g=MAC.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.04;
  o.connect(g);g.connect(MAC.destination);o.start();g.gain.exponentialRampToValueAtTime(0.0001,MAC.currentTime+(d||0.1));o.stop(MAC.currentTime+(d||0.1));}catch(e){}}

const mState={raf:null,frame:0,node:0,target:0,dist:0,cam:{x:0,y:0},walking:false,face:1,anim:0,parts:[],listeners:[],held:{l:false,r:false},hero:'piggy'};
function maxReach(){ let m=0; for(let i=0;i<LEVELS.length;i++) if(unlocked(i)) m=i; return m; }
function mOn(el,ev,fn){ el.addEventListener(ev,fn); mState.listeners.push([el,ev,fn]); }
function camWant(p){ return {x:Math.max(0,Math.min(WORLDW-MVW,p.x-MVW/2)),
                             y:Math.max(0,Math.min(WORLDH-MVH,p.y-MVH/2-30))}; }

function startMap(){
  stopMap(); mapOn=true;
  const mr=maxReach();
  let saved=+(localStorage.getItem('ppmap:pos')||0);
  if(!(saved>=0&&saved<LEVELS.length)) saved=0;
  mState.node=mState.target=Math.min(saved,mr);
  mState.dist=NODE_D[mState.node];
  mState.cam=camWant(posAt(mState.dist));
  mState.walking=false; mState.parts=[]; mState.frame=0; mState.hero=heroKey();
  mState.held={l:false,r:false};
  const held=mState.held;
  fitMap(); mOn(window,'resize',fitMap);
  function tryEnter(){ if(!mState.walking&&mapOn){ mbeep(700,0.08,'triangle',0.05); startLevel(mState.node); } }
  function kd(e){ if(!mapOn)return;
    if(e.code==='ArrowLeft'||e.code==='KeyA')held.l=true;
    if(e.code==='ArrowRight'||e.code==='KeyD')held.r=true;
    if(['Space','ArrowUp','Enter','KeyW'].includes(e.code)){tryEnter();e.preventDefault();} }
  function ku(e){ if(e.code==='ArrowLeft'||e.code==='KeyA')held.l=false;
    if(e.code==='ArrowRight'||e.code==='KeyD')held.r=false; }
  mOn(window,'keydown',kd); mOn(window,'keyup',ku);
  [['gLeft','l'],['gRight','r']].forEach(pair=>{ const el=document.getElementById(pair[0]);
    mOn(el,'pointerdown',e=>{e.preventDefault();held[pair[1]]=true;});
    ['pointerup','pointerleave','pointercancel'].forEach(ev=>mOn(el,ev,e=>{e.preventDefault();held[pair[1]]=false;})); });
  mOn(document.getElementById('gJump'),'pointerdown',e=>{e.preventDefault();tryEnter();});
  mOn(MCV,'pointerdown',e=>{ const r=MCV.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width*MVW+mState.cam.x, y=(e.clientY-r.top)/r.height*MVH+mState.cam.y;
    for(let i=0;i<=maxReach();i++){ const p=posAt(NODE_D[i]);
      if(Math.hypot(p.x-x,p.y-y)<36){ if(i===mState.node)tryEnter(); else {mState.target=i;mbeep(520,0.05,'triangle',0.04);} return; } } });
  loopMap();
}
function stopMap(){ mapOn=false; if(mState.raf)cancelAnimationFrame(mState.raf); mState.raf=null;
  mState.listeners.forEach(l=>l[0].removeEventListener(l[1],l[2])); mState.listeners=[]; }
function loopMap(){ if(!mapOn)return; updateMap(); drawMap(); mState.raf=requestAnimationFrame(loopMap); }

function updateMap(){ const S=mState; S.frame++;
  const mr=maxReach();
  if(!S.walking){ if(S.held.r&&S.node<mr)S.target=S.node+1;
    else if(S.held.l&&S.node>0)S.target=S.node-1; }
  if(S.target!==S.node){ S.walking=true;
    const goal=NODE_D[S.target], dir=goal>S.dist?1:-1;
    S.dist+=dir*2.7; S.anim+=0.24;
    const pp=posAt(S.dist); if(Math.abs(pp.dx)>2) S.face=(pp.dx>0?1:-1)*dir; // vänd åt gångriktningen
    if(S.frame%7===0) S.parts.push({x:pp.x-S.face*10,y:pp.y+2,vx:-S.face*0.4,vy:-0.4-Math.random()*0.4,life:16,max:16});
    if((dir>0&&S.dist>=goal)||(dir<0&&S.dist<=goal)){ S.dist=goal; S.node=S.target; S.walking=false; S.anim=0;
      try{localStorage.setItem('ppmap:pos',''+S.node);}catch(e){}
      mbeep(620,0.06,'triangle',0.04); } }
  else S.walking=false;
  for(const q of S.parts){q.life--;q.x+=q.vx;q.y+=q.vy;}
  S.parts=S.parts.filter(q=>q.life>0);
  const want=camWant(posAt(S.dist));
  S.cam.x+=(want.x-S.cam.x)*0.1; S.cam.y+=(want.y-S.cam.y)*0.1;
}

  g.addColorStop(0,'#4fb3c9'); g.addColorStop(1,'#2e7f9e');
  MX.fillStyle=g; MX.fillRect(0,0,MVW,MVH);
  // vågor (världsförankrade streck som pulserar)
  MX.strokeStyle='rgba(255,255,255,.30)'; MX.lineWidth=2; MX.lineCap='round';
  for(let i=0;i<48;i++){ const wx=(i*197)%WORLDW, wy=(i*131+((i*53)%60))%WORLDH;
    const x=wx-cx, y=wy-cy; if(x<-30||x>MVW+30||y<-20||y>MVH+20)continue;
    const ph=Math.sin(S.frame*0.04+i*1.7); if(ph<0)continue;
    MX.globalAlpha=ph*0.8;
    MX.beginPath();MX.moveTo(x-8,y);MX.quadraticCurveTo(x,y-3,x+8,y);MX.stroke(); }
  MX.globalAlpha=1;
  // grundvatten + strand + landfyllnad (tre pass av samma cirklar)
  MX.fillStyle='rgba(190,230,235,.45)';
  for(const isl of ISLES)for(const c of isl.c){MX.beginPath();MX.arc(c[0]-cx,c[1]-cy,c[2]+26,0,7);MX.fill();}
  MX.fillStyle='#e6d3a3';
  for(const isl of ISLES)for(const c of isl.c){MX.beginPath();MX.arc(c[0]-cx,c[1]-cy,c[2]+13,0,7);MX.fill();}
  for(const isl of ISLES){ MX.fillStyle=FILLC[isl.r];
    for(const c of isl.c){MX.beginPath();MX.arc(c[0]-cx,c[1]-cy,c[2],0,7);MX.fill();} }
  // terrängtextur (deterministiskt utspridda prickar per cirkel)
  for(const isl of ISLES){ if(isl.r==='sand')continue;
    for(const c of isl.c){ for(let k=0;k<26;k++){
      const a=seeded(c[0]+k*13)*6.28, rr2=Math.sqrt(Math.abs(seeded(c[1]+k*7)))*c[2]*0.86;
      const x=c[0]+Math.cos(a)*rr2-cx, y=c[1]+Math.sin(a)*rr2-cy;
      if(x<-10||x>MVW+10||y<-10||y>MVH+10)continue;
      if(isl.r==='green'){ MX.fillStyle=k%5===0?'#e39ab5':'#5da84f';
        if(k%5===0){MX.fillRect(x,y,3,3);MX.fillStyle='#f4d64a';MX.fillRect(x+1,y+1,1.5,1.5);}
        else {MX.fillRect(x,y,2,4);MX.fillRect(x+3,y+1,2,3);} }
      else if(isl.r==='desert'){ MX.strokeStyle='#d9bd7f';MX.lineWidth=2;
        MX.beginPath();MX.moveTo(x-6,y);MX.quadraticCurveTo(x,y-3,x+6,y);MX.stroke(); }
      else { const tw=Math.sin(S.frame*0.05+k*2.3);
        if(tw>0.3){MX.fillStyle='rgba(255,255,255,'+(tw*0.9)+')';MX.fillRect(x,y,2,2);}
        MX.fillStyle='#d7e9f4';MX.fillRect(x+4,y+3,3,2); } } } }
  // stigen — stenplattor med skugga
  const total=PLEN[PLEN.length-1];
  for(let d=0;d<=total;d+=24){ const p=posAt(d), x=p.x-cx, y=p.y-cy;
    if(x<-20||x>MVW+20||y<-20||y>MVH+20)continue;
    MX.fillStyle='rgba(90,64,36,.30)';MX.beginPath();MX.ellipse(x+1.5,y+2,8,4.4,0,0,7);MX.fill();
    MX.fillStyle='#f4e6c8';MX.beginPath();MX.ellipse(x,y,8,4.6,0,0,7);MX.fill();
    MX.fillStyle='rgba(190,160,110,.5)';MX.beginPath();MX.ellipse(x,y+1.4,5.5,2.4,0,0,7);MX.fill(); }
  // noder (plattan; emoji/stjärnor ritas i djuppasset så hjälten kan gå bakom)
  for(let i=0;i<LEVELS.length;i++){ const L=LEVELS[i], p=posAt(NODE_D[i]), x=p.x-cx, y=p.y-cy;
    if(x<-60||x>MVW+60||y<-60||y>MVH+60)continue;
    const st=progress()[L.id]||0, lock=!unlocked(i);
    if(!lock&&st===0&&i===mr){ const pu=3+Math.sin(S.frame*0.09)*2.4;
      MX.strokeStyle='rgba(244,214,74,.9)';MX.lineWidth=3;
      MX.beginPath();MX.ellipse(x,y,20+pu,12+pu*0.6,0,0,7);MX.stroke(); }
    MX.fillStyle='rgba(0,0,0,.25)';MX.beginPath();MX.ellipse(x+2,y+3,18,10,0,0,7);MX.fill();
    MX.fillStyle=lock?'#6b6478':(st>0?'#6bbf59':'#f4d64a');
    MX.beginPath();MX.ellipse(x,y,17,10.5,0,0,7);MX.fill();
    MX.strokeStyle='#2a2830';MX.lineWidth=3;MX.beginPath();MX.ellipse(x,y,17,10.5,0,0,7);MX.stroke();
    MX.fillStyle='rgba(255,255,255,.4)';MX.beginPath();MX.ellipse(x-5,y-3,6,3,0,0,7);MX.fill(); }
  // djup-sorterat: dekor + hjälte + nodmarkörer (emoji över plattan)
  const draws=[];
  for(const d of DECOR){ const x=d.x-cx,y=d.y-cy; if(x<-120||x>MVW+120||y<-40||y>MVH+150)continue;
    draws.push({y:d.y,f:()=>{ if(d.t==='tree')dTree(x,y); else if(d.t==='bush')dBush(x,y);
      else if(d.t==='pyr')dPyr(x,y,d.s); else if(d.t==='cact')dCact(x,y);
      else if(d.t==='peak')dPeak(x,y,d.s); else dCry(x,y); }}); }
  for(let i=0;i<LEVELS.length;i++){ const L=LEVELS[i], p=posAt(NODE_D[i]), x=p.x-cx, y=p.y-cy;
    if(x<-60||x>MVW+60||y<-60||y>MVH+60)continue;
    const st=progress()[L.id]||0, lock=!unlocked(i);
    draws.push({y:p.y-1,f:()=>{ MX.textAlign='center'; MX.font='21px sans-serif';
      MX.fillText(lock?'\uD83D\uDD12':L.emoji,x,y-16);
      if(st>0){MX.font='11px sans-serif';MX.fillText('\u2B50'.repeat(st),x,y+24);} }}); }
  const hp=posAt(S.dist), hx=hp.x-cx, hy=hp.y-cy, HC=MCHARS[S.hero];
  draws.push({y:hp.y+0.5,f:()=>{
    MX.fillStyle='rgba(0,0,0,.3)';MX.beginPath();MX.ellipse(hx,hy+2,14,5,0,0,7);MX.fill();
    const bob=S.walking?Math.sin(S.anim*3)*2:Math.sin(S.frame*0.05)*1.5;
    const img=S.walking?MIMG[HC.walk[Math.floor(S.anim)%2]]:MIMG[HC.idle];
    const flip=(HC.native===-1)?(S.face>0):(S.face<0);
    sprM(img,hx,hy-2+bob,HC.h,flip); }});
  draws.sort((a,b)=>a.y-b.y).forEach(d=>d.f());
  // damm
  for(const q of S.parts){ MX.globalAlpha=Math.max(0,q.life/q.max);
    MX.fillStyle='#f4e6c8'; MX.fillRect(q.x-cx-1.5,q.y-cy-1.5,3,3); }
  MX.globalAlpha=1;
  // världsnamn
  MX.textAlign='center';
  [['\uD83C\uDF31 Gr\u00e4s\u00e4ngarna',330,368],['\uD83C\uDFDC\uFE0F \u00d6knen',830,332],['\u2744\uFE0F Isbergen',1300,278]].forEach(wn=>{
    const x=wn[1]-cx, y=wn[2]-cy; if(x<-200||x>MVW+200||y<-40||y>MVH+40)return;
    MX.font='bold 21px system-ui'; MX.fillStyle='rgba(15,10,25,.55)'; MX.fillText(wn[0],x+2,y+2);
    MX.fillStyle='rgba(255,255,255,.95)'; MX.fillText(wn[0],x,y); });
  // HUD: titel + plånbok
  MX.font='bold 18px system-ui'; MX.textAlign='left';
  MX.fillStyle='rgba(15,10,25,.55)'; MX.fillText('\uD83D\uDDFA\uFE0F V\u00e4rldskartan',66,32);
  MX.fillStyle='#fff'; MX.fillText('\uD83D\uDDFA\uFE0F V\u00e4rldskartan',64,30);
  const wtxt='\uD83E\uDE99 '+walletNow();
  MX.font='bold 17px system-ui';
  const ww=MX.measureText(wtxt).width+26;
  MX.fillStyle='rgba(20,12,40,.55)'; mrr(MVW-ww-14,12,ww,32,12); MX.fill();
  MX.strokeStyle='#f4d64a'; MX.lineWidth=2; mrr(MVW-ww-14,12,ww,32,12); MX.stroke();
  MX.fillStyle='#f4d64a'; MX.fillText(wtxt,MVW-ww-1,34);
  // panel med aktuell bana
  const L=LEVELS[S.node], st=progress()[L.id]||0;
  const pw=340, px=MVW/2-pw/2, py=MVH-64;
  MX.fillStyle='rgba(20,12,40,.72)'; mrr(px,py,pw,52,14); MX.fill();
  MX.strokeStyle='rgba(244,214,74,.8)'; MX.lineWidth=2; mrr(px,py,pw,52,14); MX.stroke();
  MX.textAlign='center'; MX.fillStyle='#f4d64a'; MX.font='bold 17px system-ui';
  MX.fillText(L.emoji+' '+L.name+'  '+'\u2B50'.repeat(st), MVW/2, py+21);
  MX.fillStyle='#d9d0ef'; MX.font='13px system-ui';
  MX.fillText(S.walking?'\u2026':'HOPP = spela   \u25C0 \u25B6 = g\u00e5   (eller tryck p\u00e5 en bana)', MVW/2, py+41);
  MX.textAlign='left';
}

function startLevel(i){
  curIdx=i; const L=LEVELS[i];
  stopMap();
  document.getElementById('map').classList.add('off');
  document.getElementById('game').classList.add('on');
  document.getElementById('banner').classList.remove('on');
  if(handle)handle.stop();
  handle=runGame(document.getElementById('cv'), L.data, ASSETS, {
    theme:L.data.theme, move:L.move, saveKey:SAVE_GAME,
    title:[
      {t:L.name,s:40,y:110,c:'#f4d64a'},
      {t:WORLDS[L.world].name,s:20,y:146,c:'#fff'},
      {t:'\u2B50 Klara banan   \u2B50 R\u00e4dda alla kompisar   \u2B50 Ta alla mynt',s:15,y:196,c:'#ffe9c0'},
      {t:'V\u00e4lj hj\u00e4lte \u2014 tryck sen var som helst f\u00f6r att b\u00f6rja',s:16,y:250,c:'#f4d64a'}
    ],
    onEnd:res=>{ if(!res.won)return;
      const stars=1+(res.friendsTotal>0&&res.rescued===res.friendsTotal?1:0)+(res.allCoins?1:0);
      setStars(L.id,stars);
      showBanner(L,res,stars);
    }
  });
}
function showBanner(L,res,stars){
  document.getElementById('bTitle').textContent=L.name+' klarad!';
  ['s1','s2','s3'].forEach((id,i)=>{
    const el=document.getElementById(id); el.className=i<stars?'won':'';
  });
  document.getElementById('bCrit').innerHTML=
    '\u2705 Banan klarad<br>'+
    (res.rescued===res.friendsTotal&&res.friendsTotal>0?'\u2705':'\u2B1C')+' Kompisar: '+res.rescued+'/'+res.friendsTotal+'<br>'+
    (res.allCoins?'\u2705':'\u2B1C')+' Mynt: '+res.coinsGot+'/'+res.coinsTotal;
  setTimeout(()=>document.getElementById('banner').classList.add('on'),900);
}
function toMap(){ if(handle){handle.stop();handle=null;}
  document.getElementById('banner').classList.remove('on');
  document.getElementById('game').classList.remove('on');
  document.getElementById('map').classList.remove('off');
  startMap(); }
document.getElementById('toMap').onclick=toMap;
document.getElementById('bMap').onclick=toMap;
document.getElementById('bAgain').onclick=()=>{ document.getElementById('banner').classList.remove('on'); startLevel(curIdx); };
startMap();
</script></body></html>
